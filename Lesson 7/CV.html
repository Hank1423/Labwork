<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Trần Văn B - Developer</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="cv-container">
        <header class="cv-header">
            <div class="profile-image-wrapper">
                <img src="meo.jpg" alt="Ảnh đại diện" class="profile-image">
            </div>
            <div class="header-text">
                <h1>CV Trần Văn B</h1>
                <p class="subtitle">Developer</p>
            </div>
        </header>

        <div class="cv-grid">
            <aside class="left-column">
                <section class="cv-section">
                    <h2><i class="fas fa-user"></i> Thông tin</h2>
                    <ul class="info-list">
                        <li><strong>Họ tên:</strong> Trần Văn B</li>
                        <li><strong>Ngày sinh:</strong> 01/01/1990</li>
                        <li><strong>Email:</strong> b@example.com</li>
                        <li><strong>SĐT:</strong> 0123456789</li>
                    </ul>
                </section>

                <section class="cv-section">
                    <h2><i class="fas fa-code"></i> Kỹ năng</h2>
                    <div class="skill-item">
                        <span>HTML/CSS</span>
                        <div class="progress-bar"><div class="progress" style="width: 70%;"></div></div>
                    </div>
                    <div class="skill-item">
                        <span>JavaScript</span>
                        <div class="progress-bar"><div class="progress" style="width: 50%;"></div></div>
                    </div>
                </section>
            </aside>

            <article class="right-column">
                <section class="video-intro-section">
                    <h3><i class="fas fa-video"></i> Video giới thiệu</h3>
                    <div class="video-wrapper">
                        <video controls width="100%">
                            <source src="intro.mp4" type="video/mp4">
                        </video>
                    </div>
                </section>

                <section class="audio-section">
                    <h3><i class="fas fa-microphone"></i> Ghi âm</h3>
                    <div class="audio-wrapper">
                        <audio controls><source src="intro.mp3" type="audio/mpeg"></audio>
                    </div>
                </section>
            </article>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</body>
</html>
