<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num = [-3, 5, 1, 3, 22, 10];
        let max = num[0];
        let index = 0;
        for (i = 1; i < num.length; i++){
            if (num[i] > max) {
                max = num[i];
                index = i;
            }
        }
        alert("max " + max + " at position " + index);
    </script>

</html>
