<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Ký Đơn Giản</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .gender-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 5px;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="registration-card">
        <h1>Đăng Ký người dùng</h1>
        <form action="http://demo.codegym.vn/6/registration_form/register.php" method="POST">
            <div class="form-group">
                <label for="fullname">Họ và tên:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="nguyenvana@example.com" required>
            </div>
            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" placeholder="0123456789" required>
            </div>
            <div class="form-group">
                <label>Giới tính:</label>
                <div class="gender-group">
                    <label style="font-weight: normal;">
                        <input type="radio" name="gioitinh" value="Nam" checked> Nam
                    </label>
                    <label style="font-weight: normal;">
                        <input type="radio" name="gioitinh" value="Nữ"> Nữ
                    </label>
                </div>
            </div>
            <input type="submit" value="Đăng Ký">
        </form>
    </div>
</body>


</html>
