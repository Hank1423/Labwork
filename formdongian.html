<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sở Thích Của Bạn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #e0fbfc;
        }

        .interest-form {
            border: 1px solid #ccc;
            background-color: #fff;
            width: 500px;
        }

        .header {
            background-color: #ff4500;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            margin-bottom: 10px;
            padding: 5px 20px;
        }

        .form-group label {
            width: 100px;
            color: #00008b;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group input[type="email"] {
            flex: 1;
            border: 1px solid #777;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            color: #ff4500
        }

        .button-group {
            text-align: center;
            padding: 15px;
        }

        button {
            padding: 5px 15px;
            margin: 0 5px;
            cursor: pointer;
            background-color: #e1e1e1;
            border: 1px solid #888;
            box-shadow: 1px 1px 2px #888;
        }

        button:active {
            box-shadow: inset 1px 1px 2px #888;
        }
    </style>
</head>

<body>
    <form action="#" method="post" class="interest-form">
        <div class="header">SỞ THÍCH CỦA BẠN</div>
        <div class="form-group">
            <label for="yourname">Họ và tên</label>
            <input type="text" id="yourname" name="yourname">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </div>
        <div class="form-group">
            <label>Sở thích</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="hobby" value="Thể thao"> Thể thao</label>
                <label><input type="checkbox" name="hobby" value="Âm nhạc"> Âm nhạc</label>
                <label><input type="checkbox" name="hobby" value="Du lịch"> Du lịch</label>
                <label><input type="checkbox" name="hobby" value="Đọc sách"> Đọc sách</label>
                <label><input type="checkbox" name="hobby" value="Thể thao"> Thể thao</label>
                <label><input type="checkbox" name="hobby" value="Lướt Web"> Lướt Web</label>
                <label><input type="checkbox" name="hobby" value="Điện Ảnh"> Điện Ảnh</label>
                <label><input type="checkbox" name="hobby" value="Chơi game"> Chơi game</label>
            </div>

            <div class="button-group">
                <button type="submit">Gửi thông tin</button>
                <button type="reset">Nhập lại</button>
            </div>
        </div>
    </form>
</body>
</html>
