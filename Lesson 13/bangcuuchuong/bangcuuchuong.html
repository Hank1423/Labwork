<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <h1>Bảng cửu chương</h1>
    <div id="content"></div>
    <script>
        let content = "<table border='1' width='100%' cellspacing='0' cellpadding='3'>";
        for (let i = 1; i <= 9; i++) {
            content += "<tr>";
            for (let j = 2; j <= 9; j++) {
                content += `<td>${j}x${i}=${j * i}</td>`;
            }
            content += "</tr>";
        }
        content += "</table>";
        document.getElementById("content").innerHTML = content;
    </script>
</body>

</html>
