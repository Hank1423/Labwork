<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num = parseInt(prompt("Nhập n số nguyên tố từ bàn phím: "));
        let count = 0;
        for (let N = 2; count < num; N++) {
            let isPrime = true;

            for (i = 2; i < N; i++) {
                if (N % i === 0) {
                    isPrime = false;
                    break;
                }
            }
            if (isPrime) {
                console.log(N);
                count++;
            }
        }
    </script>
</body>

</html>
